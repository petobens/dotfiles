# Keep the same information order as Trueline with a simpler unboxed layout
format = """
$username\
$hostname\
$aws\
$python\
$conda\
$git_branch\
$git_status\
$directory\
$jobs\
$status\
$line_break\
$character"""
palette = "onedark"
add_newline = false

[palettes.onedark]
background = "#24272e"
foreground = "#abb2bf"
cursor_grey = "#282c34"
special_grey = "#3b4048"
blue = "#61afef"
green = "#98c379"
orange = "#d19a66"
purple = "#c678dd"
red = "#e06c75"
white = "#d0d0d0"

[username]
show_always = true
format = "[$user]($style) "
style_user = "bold white"
style_root = "bold red"

# Trueline adds the host only in SSH sessions
[hostname]
ssh_only = true
format = "[@$hostname](bold white) "

[aws]
format = "[ $profile](bold orange) "

[python]
format = "[ $virtualenv](bold purple) "

[conda]
ignore_base = true
format = "[ $environment](bold purple) "

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "foreground"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "red"
conflicted = ""
deleted = ""
modified = "${count} "
renamed = ""
staged = ""
stashed = ""
typechanged = ""
untracked = ""
ahead = "${count} "
behind = "${count} "
diverged = "${ahead_count} ${behind_count} "

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " "
read_only_style = "bold orange"
truncation_length = 3
truncate_to_repo = false

[jobs]
format = "[ $number](bold orange) "
number_threshold = 1
symbol_threshold = 1

[status]
disabled = false
format = "[ $status](bold red) "

# Fish supplies the vi mode while Starship renders its final indicator
[character]
success_symbol = "[I ❯](bold blue)"
error_symbol = "[I ❯](bold red)"
vimcmd_symbol = "[N ❮](bold green)"
vimcmd_replace_one_symbol = "[R ❮](bold purple)"
vimcmd_replace_symbol = "[R ❮](bold purple)"
vimcmd_visual_symbol = "[V ❮](bold blue)"
