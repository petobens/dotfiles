# Use the Wayland clipboard for copy mode and bracketed paste
set-option -g @clipboard-copy 'wl-copy'
set-option -g @clipboard-paste 'wl-paste -n'

bind -T copy-mode-vi y send -X copy-pipe-and-cancel '#{@clipboard-copy}'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel '#{@clipboard-copy}'
bind P run-shell '#{@clipboard-paste} | tmux load-buffer - ; tmux paste-buffer'
bind p run-shell '#{@clipboard-paste} | tmux load-buffer - ; tmux send-keys escape "[200~"; tmux paste-buffer; tmux send-keys escape "[201~"'
