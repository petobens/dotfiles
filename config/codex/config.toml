# Model
model = "gpt-5.5"
model_reasoning_effort = "low"

# Permissions/Approvals
default_permissions = ":workspace" # Allow writes inside the workspace
approval_policy = "on-request"     # Ask before acting outside workspace

[tui]
theme = "two-dark"

# MCP
[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"

# Trusted projects (skip the per-directory trust prompt)
[projects."/home/pedro/git-repos/private/dotfiles"]
trust_level = "trusted"
