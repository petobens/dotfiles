# Suppress new codex version check on startup
check_for_updates = false

# Model
model = "gpt-5.5"
model_reasoning_effort = "medium"

# Permissions/Approvals
default_permissions = ":workspace" # Allow writes inside the workspace
approval_policy = "on-request"     # Ask before acting outside workspace

# TUI
[tui]
theme = "two-dark"
status_line = [
    "model-with-reasoning",
    "current-dir",
    "used-tokens",
    "context-used",
]
show_tooltips = false

# MCP
[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"

# Trusted projects (skip the per-directory trust prompt)
[projects."/home/pedro/git-repos/private/dotfiles"]
trust_level = "trusted"
[projects."/home/pedro/git-repos/private/notes"]
trust_level = "trusted"
